<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Microscope favicon for GitHub PR Explorer -->
  <!-- Eyepiece -->
  <rect x="26" y="2" width="12" height="8" rx="2" fill="#6366f1"/>
  <!-- Tube -->
  <rect x="29" y="10" width="6" height="18" rx="1" fill="#818cf8"/>
  <!-- Objective lens -->
  <rect x="27" y="28" width="10" height="6" rx="2" fill="#4f46e5"/>
  <!-- Stage -->
  <rect x="16" y="38" width="22" height="4" rx="1" fill="#a5b4fc"/>
  <!-- Slide on stage -->
  <rect x="20" y="36" width="14" height="2" rx="0.5" fill="#c7d2fe"/>
  <!-- Arm (curved back support) -->
  <path d="M35 10 Q44 10 44 20 L44 42" stroke="#6366f1" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="12" y="52" width="40" height="6" rx="3" fill="#4f46e5"/>
  <!-- Pillar -->
  <rect x="30" y="42" width="4" height="10" rx="1" fill="#818cf8"/>
  <!-- Focus knob -->
  <circle cx="46" cy="30" r="4" fill="#a5b4fc"/>
  <circle cx="46" cy="30" r="2" fill="#6366f1"/>
</svg>
